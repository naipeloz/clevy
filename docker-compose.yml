services:
  db:
    image: postgres:17-alpine
    container_name: clevy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clevy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clevy}
      POSTGRES_DB: ${POSTGRES_DB:-clevy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clevy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clevy-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clevy}:${POSTGRES_PASSWORD:-clevy}@db:5432/${POSTGRES_DB:-clevy}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
